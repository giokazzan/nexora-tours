<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin de Tours — Nexora</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--navy:#071a26;--navy-mid:#0d2d3f;--teal:#0b9e99;--teal-light:#3ecfc4;--gold:#f5c842;--white:#fff;--gray:#8ab2b0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}
.wrap{max-width:720px;margin:0 auto;padding:32px 20px 80px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:34px;margin-bottom:4px;}
.sub{color:var(--gray);font-size:13px;margin-bottom:28px;}
.card{background:var(--navy-mid);border:1px solid rgba(11,158,153,0.25);border-radius:14px;padding:24px;margin-bottom:20px;}
label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:5px;margin-top:14px;}
label:first-child{margin-top:0;}
input,textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:11px 14px;color:var(--white);font-family:inherit;font-size:16px;}
textarea{resize:vertical;min-height:70px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row4{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
button{cursor:pointer;font-family:inherit;}
.btn{width:100%;background:linear-gradient(135deg,var(--teal),var(--teal-light));color:#fff;border:none;border-radius:8px;padding:13px;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;margin-top:18px;}
.btn-secondary{background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--gray);}
.err{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:16px;}
.ok{color:#5dcf8e;font-size:12px;margin-top:8px;}
#login-view{max-width:360px;margin:80px auto;}
.hidden{display:none;}
.img-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.img-preview div{position:relative;width:70px;height:70px;border-radius:8px;overflow:hidden;}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-preview .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;line-height:1;}
.tour-row{display:flex;align-items:center;gap:14px;padding:14px;border-bottom:1px solid rgba(255,255,255,0.06);}
.tour-row img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.05);}
.tour-row .info{flex:1;min-width:0;}
.tour-row .name{font-weight:700;}
.tour-row .meta{font-size:12px;color:var(--gray);}
.tour-row .acts{display:flex;gap:8px;}
.tour-row .acts button{background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--gray);border-radius:6px;padding:6px 10px;font-size:12px;}
.badge-activo{color:var(--teal-light);}
.badge-inactivo{color:#ff6b6b;}
.section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:12px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.top-bar a{color:var(--gray);font-size:12px;text-decoration:none;}
</style>
</head>
<body>

<div id="login-view">
  <h1>Admin Tours</h1>
  <div class="sub">Acceso solo para el equipo Nexora</div>
  <div class="card">
    <label>Correo</label>
    <input type="email" id="login-email" placeholder="tu@correo.com">
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••">
    <button class="btn" onclick="hacerLogin()">Entrar</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<div id="admin-view" class="wrap hidden">
  <div class="top-bar">
    <h1 style="font-size:26px">✦ Admin de Tours</h1>
    <a href="/index-es.html">Ver sitio →</a>
  </div>

  <div class="card">
    <div class="section-label" id="form-titulo">Agregar tour nuevo</div>
    <label>Nombre del tour</label>
    <input type="text" id="t-nombre" placeholder="ej: Cenote Secreto en Bici">
    <label>Destino</label>
    <input type="text" id="t-destino" placeholder="ej: Puerto Morelos">
    <label>Etiqueta / Badge</label>
    <input type="text" id="t-badge" placeholder="ej: NUEVO, MÁS POPULAR, AVENTURA">
    <label>Descripción</label>
    <textarea id="t-descripcion" placeholder="Descripción corta y atractiva del tour"></textarea>
    <label>Incluye (separado por comas)</label>
    <input type="text" id="t-features" placeholder="ej: Almuerzo incluido, Transporte, Guía certificado">
    <label>Itinerario / instrucciones</label>
    <textarea id="t-itinerario" placeholder="Detalle del itinerario, horarios, qué llevar, etc."></textarea>
    <label>Info de pick-up</label>
    <input type="text" id="t-pickup" placeholder="ej: Pickup incluido desde tu hotel">
    <label>Nota importante (opcional — ej. "No incluye impuesto de muelle $20 USD")</label>
    <input type="text" id="t-nota">

    <label>Precios en pesos (MXN)</label>
    <div class="row4">
      <div><div style="font-size:11px;color:var(--gray);margin-bottom:4px">Adulto extranjero</div><input type="number" id="t-p-ext-adulto"></div>
      <div><div style="font-size:11px;color:var(--gray);margin-bottom:4px">Menor extranjero</div><input type="number" id="t-p-ext-menor"></div>
      <div><div style="font-size:11px;color:var(--gray);margin-bottom:4px">Adulto nacional</div><input type="number" id="t-p-nac-adulto"></div>
      <div><div style="font-size:11px;color:var(--gray);margin-bottom:4px">Menor nacional</div><input type="number" id="t-p-nac-menor"></div>
    </div>

    <label>Orden de aparición</label>
    <input type="number" id="t-orden" value="0">

    <label>Imágenes</label>
    <input type="file" id="t-imagenes" accept="image/*" multiple onchange="previewImagenes(this)">
    <div class="img-preview" id="img-preview"></div>

    <div style="display:flex;align-items:center;gap:8px;margin-top:16px">
      <input type="checkbox" id="t-activo" checked style="width:auto">
      <label style="margin:0">Visible en el sitio</label>
    </div>

    <button class="btn" id="btn-guardar" onclick="guardarTour()">Guardar Tour</button>
    <button class="btn btn-secondary" id="btn-cancelar-edicion" onclick="cancelarEdicion()" style="display:none">Cancelar edición</button>
    <div class="err" id="form-err"></div>
    <div class="ok" id="form-ok"></div>
  </div>

  <div class="card">
    <div class="section-label">Tours existentes</div>
    <div id="lista-tours">Cargando…</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, getDocs, query, orderBy, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { createClient as createSupabaseClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const firebaseConfig = {
  apiKey:            "AIzaSyAJR13NWfWBURGZZtUhzA0OVjm3nSxCR28",
  authDomain:        "nexora-club.firebaseapp.com",
  projectId:         "nexora-club",
  storageBucket:     "nexora-club.firebasestorage.app",
  messagingSenderId: "651071612444",
  appId:             "1:651071612444:web:86bb7b36b1446220e661d9"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const supabase = createSupabaseClient(
  'https://cvufvcdyanfsbcilnony.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2dWZ2Y2R5YW5mc2JjaWxub255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDI2NDIsImV4cCI6MjA5OTI3ODY0Mn0.cHDYARERI0HF1S-LKau4qR6fgd4jFl6IgbueJfz_ILA'
);

const ADMIN_EMAIL = 'admkazzan@gmail.com';
let imagenesSeleccionadas = []; // File[] nuevos a subir
let imagenesExistentes = [];    // URLs ya guardadas (al editar)
let tourEditandoId = null;

window.hacerLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  err.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    err.textContent = 'Correo o contraseña incorrectos.';
  }
};

onAuthStateChanged(auth, (user) => {
  if (user && user.email === ADMIN_EMAIL) {
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('admin-view').classList.remove('hidden');
    cargarTours();
  } else {
    document.getElementById('login-view').classList.remove('hidden');
    document.getElementById('admin-view').classList.add('hidden');
  }
});

window.previewImagenes = (input) => {
  imagenesSeleccionadas = Array.from(input.files);
  renderPreview();
};

function renderPreview() {
  const box = document.getElementById('img-preview');
  let html = '';
  imagenesExistentes.forEach((url, i) => {
    html += `<div><img src="${url}"><button class="rm" onclick="quitarExistente(${i})">✕</button></div>`;
  });
  imagenesSeleccionadas.forEach((file, i) => {
    html += `<div><img src="${URL.createObjectURL(file)}"><button class="rm" onclick="quitarNueva(${i})">✕</button></div>`;
  });
  box.innerHTML = html;
}
window.quitarExistente = (i) => { imagenesExistentes.splice(i, 1); renderPreview(); };
window.quitarNueva = (i) => { imagenesSeleccionadas.splice(i, 1); renderPreview(); };

async function subirImagenesSupabase(tourId) {
  const urls = [];
  for (const file of imagenesSeleccionadas) {
    const nombreLimpio = file.name
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-zA-Z0-9.\-_]/g, '_');
    const path = `tours/${tourId}/${Date.now()}_${nombreLimpio}`;
    const { error } = await supabase.storage.from('comprobantes').upload(path, file, {
      contentType: file.type || 'image/jpeg',
    });
    if (error) throw new Error('Error subiendo imagen: ' + error.message);
    const { data } = supabase.storage.from('comprobantes').getPublicUrl(path);
    urls.push(data.publicUrl);
  }
  return urls;
}

window.guardarTour = async () => {
  const errEl = document.getElementById('form-err');
  const okEl  = document.getElementById('form-ok');
  errEl.textContent = ''; okEl.textContent = '';

  const nombre = document.getElementById('t-nombre').value.trim();
  const destino = document.getElementById('t-destino').value.trim();
  if (!nombre) { errEl.textContent = 'El nombre del tour es obligatorio.'; return; }

  const btn = document.getElementById('btn-guardar');
  btn.textContent = 'Guardando...'; btn.disabled = true;

  try {
    const tourId = tourEditandoId || doc(collection(db, 'nexora_tours')).id;
    const nuevasUrls = await subirImagenesSupabase(tourId);
    const imagenes = [...imagenesExistentes, ...nuevasUrls];

    const data = {
      nombre,
      destino,
      badge: document.getElementById('t-badge').value.trim(),
      descripcion: document.getElementById('t-descripcion').value.trim(),
      features: document.getElementById('t-features').value.split(',').map(s => s.trim()).filter(Boolean),
      itinerario: document.getElementById('t-itinerario').value.trim(),
      pickup: document.getElementById('t-pickup').value.trim(),
      nota: document.getElementById('t-nota').value.trim(),
      precios: {
        ext: { adulto: Number(document.getElementById('t-p-ext-adulto').value) || 0, menor: Number(document.getElementById('t-p-ext-menor').value) || 0 },
        nac: { adulto: Number(document.getElementById('t-p-nac-adulto').value) || 0, menor: Number(document.getElementById('t-p-nac-menor').value) || 0 },
      },
      orden: Number(document.getElementById('t-orden').value) || 0,
      imagenes,
      activo: document.getElementById('t-activo').checked,
    };

    await setDoc(doc(db, 'nexora_tours', tourId), data, { merge: true });
    okEl.textContent = '✓ Tour guardado correctamente.';
    limpiarFormulario();
    cargarTours();
  } catch (e) {
    errEl.textContent = e.message || 'Error al guardar.';
  } finally {
    btn.textContent = 'Guardar Tour'; btn.disabled = false;
  }
};

function limpiarFormulario() {
  ['t-nombre','t-destino','t-badge','t-descripcion','t-features','t-itinerario','t-pickup','t-nota','t-p-ext-adulto','t-p-ext-menor','t-p-nac-adulto','t-p-nac-menor'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('t-orden').value = '0';
  document.getElementById('t-activo').checked = true;
  document.getElementById('t-imagenes').value = '';
  imagenesSeleccionadas = []; imagenesExistentes = []; tourEditandoId = null;
  renderPreview();
  document.getElementById('form-titulo').textContent = 'Agregar tour nuevo';
  document.getElementById('btn-cancelar-edicion').style.display = 'none';
}
window.cancelarEdicion = limpiarFormulario;

async function cargarTours() {
  const box = document.getElementById('lista-tours');
  const snap = await getDocs(query(collection(db, 'nexora_tours'), orderBy('orden')));
  if (snap.empty) { box.innerHTML = '<div style="color:var(--gray);font-size:13px">Aún no hay tours cargados.</div>'; return; }
  let html = '';
  snap.forEach(d => {
    const t = d.data();
    const img = (t.imagenes && t.imagenes[0]) || '';
    html += `<div class="tour-row">
      <img src="${img}" onerror="this.style.display='none'">
      <div class="info">
        <div class="name">${t.nombre}</div>
        <div class="meta">${t.destino || ''} · <span class="${t.activo !== false ? 'badge-activo' : 'badge-inactivo'}">${t.activo !== false ? 'Visible' : 'Oculto'}</span></div>
      </div>
      <div class="acts">
        <button onclick="editarTour('${d.id}')">Editar</button>
        <button onclick="borrarTour('${d.id}')">Borrar</button>
      </div>
    </div>`;
  });
  box.innerHTML = html;
}

window.editarTour = async (id) => {
  const snap = await getDocs(query(collection(db, 'nexora_tours')));
  const docSnap = snap.docs.find(d => d.id === id);
  if (!docSnap) return;
  const t = docSnap.data();
  tourEditandoId = id;
  document.getElementById('t-nombre').value = t.nombre || '';
  document.getElementById('t-destino').value = t.destino || '';
  document.getElementById('t-badge').value = t.badge || '';
  document.getElementById('t-descripcion').value = t.descripcion || '';
  document.getElementById('t-features').value = (t.features || []).join(', ');
  document.getElementById('t-itinerario').value = t.itinerario || '';
  document.getElementById('t-pickup').value = t.pickup || '';
  document.getElementById('t-nota').value = t.nota || '';
  document.getElementById('t-p-ext-adulto').value = t.precios?.ext?.adulto || '';
  document.getElementById('t-p-ext-menor').value = t.precios?.ext?.menor || '';
  document.getElementById('t-p-nac-adulto').value = t.precios?.nac?.adulto || '';
  document.getElementById('t-p-nac-menor').value = t.precios?.nac?.menor || '';
  document.getElementById('t-orden').value = t.orden || 0;
  document.getElementById('t-activo').checked = t.activo !== false;
  imagenesExistentes = t.imagenes || [];
  imagenesSeleccionadas = [];
  renderPreview();
  document.getElementById('form-titulo').textContent = 'Editando: ' + t.nombre;
  document.getElementById('btn-cancelar-edicion').style.display = 'block';
  window.scrollTo(0, 0);
};

window.borrarTour = async (id) => {
  if (!confirm('¿Seguro que quieres borrar este tour? No se puede deshacer.')) return;
  await deleteDoc(doc(db, 'nexora_tours', id));
  cargarTours();
};
</script>
</body>
</html>
